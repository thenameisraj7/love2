<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valentine's Day Card</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle, #ffe4e6 0%, #fecdd3 100%);
      overflow: hidden;
    }
    .cursive {
      font-family: 'Dancing Script', cursive;
    }
    /* Glassmorphism utility classes */
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 8px 32px 0 rgba(251, 113, 133, 0.2);
    }
    .glass-bubble {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    /* Floating hearts animation */
    .heart-particle {
      position: absolute;
      pointer-events: none;
      animation: floatUp 4s linear forwards;
    }
    @keyframes floatUp {
      0% {
        transform: translateY(100vh) scale(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5) rotate(360deg);
        opacity: 0;
      }
    }
    /* Smooth opacity transition for text changes */
    .fade-transition {
      transition: opacity 0.3s ease-in-out;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">

  <!-- Floating Hearts Container -->
  <div id="hearts-container" class="absolute inset-0 z-0 overflow-hidden select-none"></div>

  <!-- Main Container Card -->
  <div class="glass-card w-full max-w-md rounded-3xl p-8 text-center z-10 flex flex-col items-center justify-between min-h-[500px] transition-all duration-500 transform hover:scale-[1.01]">
    
    <!-- Decorative Header Elements -->
    <div class="flex gap-2 justify-center mb-1">
      <span class="text-2xl animate-bounce" style="animation-delay: 0s">💖</span>
      <span class="text-2xl animate-bounce" style="animation-delay: 0.2s">✨</span>
      <span class="text-2xl animate-bounce" style="animation-delay: 0.4s">💖</span>
    </div>

    <!-- Main Dynamic GIF Area -->
    <div class="w-full flex justify-center items-center my-4 min-h-[200px]">
      <img id="main-gif" src="https://media.tenor.com/images/5d31fb84a3070624bf162a4073fb1178/tenor.gif" alt="Cute Valentine GIF" class="rounded-2xl max-h-[220px] object-contain shadow-sm">
    </div>

    <!-- Interactive Button and Message Section -->
    <div class="w-full flex flex-col items-center">
      <!-- Action Buttons Container -->
      <div id="buttons-container" class="flex gap-4 justify-center items-center w-full min-h-[80px] mb-4">
        <button id="yes-btn" class="bg-gradient-to-r from-rose-500 to-pink-500 hover:from-rose-600 hover:to-pink-600 text-white font-semibold py-3 px-8 rounded-full shadow-lg shadow-rose-400/30 transition-all duration-300 transform active:scale-95 text-lg min-w-[100px]">
          YES!
        </button>
        <button id="no-btn" class="bg-white/80 hover:bg-white text-gray-700 font-semibold py-3 px-8 rounded-full shadow-md transition-all duration-300 transform active:scale-95 text-lg min-w-[100px]">
          NO
        </button>
      </div>

      <!-- Small Glassmorphism Message Bubble Directly Below Buttons -->
      <div class="min-h-[48px] flex items-center justify-center w-full">
        <div id="message-bubble" class="glass-bubble px-5 py-2.5 rounded-2xl text-rose-600 font-medium text-sm shadow-sm opacity-0 scale-95 transition-all duration-300 max-w-[85%] text-center">
          <span id="bubble-text" class="fade-transition"></span>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Elements Selection
    const yesBtn = document.getElementById('yes-btn');
    const noBtn = document.getElementById('no-btn');
    const mainGif = document.getElementById('main-gif');
    const buttonsContainer = document.getElementById('buttons-container');
    const heartsContainer = document.getElementById('hearts-container');
    const messageBubble = document.getElementById('message-bubble');
    const bubbleText = document.getElementById('bubble-text');

    // State parameters for interactions
    let clickCount = 0;
    let yesScale = 1;
    let noScale = 1;

    // Direct, gentle text alerts when clicking NO
    const noMessages = [
      "Are you absolutely sure? 🥺",
      "Think about it again! 💕",
      "But we make such a great team! 🧸",
      "What if I give you a giant virtual hug? 🤗",
      "Don't do this to me... 💔",
      "I will be very, very sad... 😢",
      "Still no? Pretty please? 🌹",
      "Okay, I'll ask one more time nicely... 🥺"
    ];

    // Helper function to update the fixed message bubble with smooth transitions
    function updateBubbleText(newText) {
      // Step 1: Make sure the bubble container is visible
      messageBubble.classList.remove('opacity-0', 'scale-95');
      messageBubble.classList.add('opacity-100', 'scale-100');
      
      // Step 2: Smoothly fade out current text, change it, and fade back in
      bubbleText.style.opacity = 0;
      setTimeout(() => {
        bubbleText.textContent = newText;
        bubbleText.style.opacity = 1;
      }, 150);
    }

    // Interactive behaviors for the NO button
    noBtn.addEventListener('click', () => {
      // Pick current phrase sequence based on click counts
      const currentMessage = noMessages[clickCount % noMessages.length];
      updateBubbleText(currentMessage);

      clickCount++;

      // Trigger dynamic transformations to emphasize choices
      if (clickCount <= 8) {
        yesScale += 0.35;
        noScale = Math.max(0.5, noScale - 0.08);

        // Apply scale changes dynamically while preserving original font weight and curves
        yesBtn.style.transform = `scale(${yesScale})`;
        noBtn.style.transform = `scale(${noScale})`;

        // Shift layout spacing to accommodate larger YES button cleanly
        buttonsContainer.style.gap = `${4 + (clickCount * 3)}px`;
      }
    });

    // Success generation logic when YES is selected
    yesBtn.addEventListener('click', () => {
      // Update primary card visual into pure celebration mode
      mainGif.src = "https://media.tenor.com/images/7d3a0104bd1fb9a12c0192df27f7112b/tenor.gif";
      
      // Clear buttons controls cleanly
      buttonsContainer.innerHTML = `
        <h1 class="cursive text-4xl md:text-5xl text-rose-600 font-bold drop-shadow-sm animate-pulse">
          Yay! Can't wait! 💖
        </h1>
      `;
      
      // Hide the persistent message bubble since choice is completed successfully
      messageBubble.classList.remove('opacity-100', 'scale-100');
      messageBubble.classList.add('opacity-0', 'scale-95');

      // Continuous particles engine initialization
      setInterval(spawnHeartParticle, 250);
    });

    // Procedural generation function for ambient celebratory hearts
    function spawnHeartParticle() {
      const heart = document.createElement('div');
      heart.classList.add('heart-particle');
      heart.innerHTML = ['❤️', '💖', '💝', '💕', '💗'][Math.floor(Math.random() * 5)];
      
      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
      heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
      
      heartsContainer.appendChild(heart);
      
      setTimeout(() => {
        heart.remove();
      }, 5000);
    }
  </script>
</body>
</html>
